site_name: SQL & Databases
site_description: Database Concepts and SQL course notes, quizzes, exercises, and projects across PostgreSQL, MySQL, SQL Server, and more.
site_author: Jahid
site_url: https://ijk37.com/sql/

repo_name: ijk37/sql
repo_url: https://github.com/ijk37/sql
edit_uri: edit/main/

docs_dir: .
site_dir: ../sql-site
use_directory_urls: false
exclude_docs: |
  mkdocs.yml
  requirements.txt
  .gitignore
  .claude/**
  .git/**
  05-resources/**
  !05-resources/README.md
  tools/**
  assets/site_design.md
  01-notes.md
  02-exercises.md
  03-quiz.md
  04-projects.md

theme:
  name: material
  custom_dir: overrides
  logo: assets/images/db-logo.svg
  favicon: assets/images/favicon.svg
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - announce.dismiss
    - content.action.edit
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.path
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

plugins:
  - same-dir
  - search
  - callouts

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.blocks.caption
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/extra.js

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ijk37/sql
      name: GitHub repository

not_in_nav: |
  README.md
  take_quiz_here.md

