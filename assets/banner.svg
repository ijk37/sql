<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260" role="img" aria-label="SQL &amp; Databases">
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#24506B"/>
      <stop offset="0.55" stop-color="#336791"/>
      <stop offset="1" stop-color="#2A5C80"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E2A33D"/>
      <stop offset="1" stop-color="#F0BE63"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="260" rx="20" fill="url(#blue)"/>
  <!-- amber bottom accent -->
  <rect x="0" y="248" width="1200" height="12" fill="url(#amber)"/>

  <!-- database motif (right side): stacked cylinders + a small table grid -->
  <g fill="none" stroke="#F0BE63" stroke-width="2" opacity="0.55">
    <ellipse cx="1030" cy="70" rx="46" ry="14"/>
    <path d="M984 70 v34 a46 14 0 0 0 92 0 v-34"/>
    <path d="M984 104 v34 a46 14 0 0 0 92 0 v-34"/>
  </g>
  <g fill="#F0BE63" opacity="0.85">
    <ellipse cx="1030" cy="70" rx="46" ry="14"/>
  </g>

  <g stroke="#F5D9A6" stroke-width="1.6" opacity="0.5">
    <rect x="1108" y="150" width="60" height="60" rx="4" fill="none"/>
    <line x1="1108" y1="170" x2="1168" y2="170"/>
    <line x1="1108" y1="190" x2="1168" y2="190"/>
    <line x1="1128" y1="150" x2="1128" y2="210"/>
    <line x1="1148" y1="150" x2="1148" y2="210"/>
  </g>

  <!-- text -->
  <text x="64" y="86" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="4" fill="#F5D9A6">SQL &amp; DATABASES &#183; SELF-PACED STUDY</text>
  <text x="60" y="158" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff">SQL &amp; Databases</text>
  <text x="64" y="205" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#DCE9F2">Notes &#183; Exercises &#183; Quizzes &#183; Projects</text>
</svg>
